<!DOCTYPE html>
<!-- Updated: 2026-05-06 with signal columns (SIGNAL, RSI, MACD, TREND, CROSS) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>TradingPulse</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<style>
  :root{--bg:#0d0f14;--surface:#161a24;--surface2:#1e2330;--border:#2a2f3d;--text:#e2e8f0;--muted:#6b7280;--accent:#3b82f6;--high:#ef4444;--medium:#f59e0b;--low:#6b7280;--bullish:#10b981;--bearish:#ef4444;--neutral:#6b7280}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  header{display:flex;align-items:center;gap:1rem;padding:.6rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
  .logo{font-weight:700;font-size:1em;color:var(--accent)}.logo span{color:var(--text)}
  .header-right{display:flex;align-items:center;gap:1rem;margin-left:auto;font-size:.72em;color:var(--muted);flex-wrap:wrap}
  .pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--bullish);margin-right:4px;animation:pulse 2s infinite}
  #countdown-val{color:var(--accent);font-weight:600}
  .price-bar{height:30px;background:#0a0c10;border-bottom:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center}
  .price-track{display:flex;animation:marquee 60s linear infinite;white-space:nowrap}
  .price-bar:hover .price-track{animation-play-state:paused}
  .price-chip{display:inline-flex;align-items:center;gap:.4rem;padding:0 .8rem;border-right:1px solid var(--border);height:30px;flex-shrink:0}
  .chip-sym{font-size:.68em;font-weight:700;color:var(--muted)}
  .chip-price{font-size:.74em;font-weight:600}
  .chip-chg{font-size:.68em;font-weight:600}
  .up{color:var(--bullish)}.down{color:var(--bearish)}.flat{color:var(--muted)}
  .tabs-bar{display:flex;align-items:center;gap:.3rem;padding:.45rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
  .tab{padding:.25rem .65rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.75em;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .15s}
  .tab:hover{background:var(--surface2);color:var(--text)}.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .filters-bar{display:flex;align-items:center;gap:.4rem;padding:.4rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
  .feed-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .feed-btn{padding:.2rem .7rem;border:none;background:transparent;color:var(--muted);font-size:.72em;font-weight:700;cursor:pointer;transition:all .15s}
  .feed-btn.active{background:var(--accent);color:#fff}
  .divider{width:1px;height:16px;background:var(--border);margin:0 .2rem}
  .filter-lbl{font-size:.7em;color:var(--muted)}
  .fbtn{padding:.18rem .55rem;border-radius:999px;border:1px solid;background:transparent;font-size:.7em;font-weight:600;cursor:pointer;transition:opacity .15s}
  .fbtn:not(.active){opacity:.35}
  .main{display:flex;flex:1;overflow:hidden}
  .news-panel{flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.6rem}
  .news-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem;animation:fadeIn .3s ease;transition:border-color .2s}
  .news-card:hover{border-color:var(--accent)}
  .card-meta{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;margin-bottom:.3rem}
  .ticker-badge{font-size:.67em;font-weight:700;padding:.12rem .45rem;border-radius:4px;background:rgba(59,130,246,.15);color:var(--accent);border:1px solid rgba(59,130,246,.3)}
  .tag{font-size:.65em;font-weight:700;padding:.1rem .42rem;border-radius:999px}
  .tag.high{background:rgba(239,68,68,.15);color:var(--high);border:1px solid rgba(239,68,68,.3)}
  .tag.medium{background:rgba(245,158,11,.12);color:var(--medium);border:1px solid rgba(245,158,11,.3)}
  .tag.low{background:rgba(107,114,128,.1);color:var(--low);border:1px solid rgba(107,114,128,.25)}
  .tag.bullish{background:rgba(16,185,129,.12);color:var(--bullish);border:1px solid rgba(16,185,129,.3)}
  .tag.bearish{background:rgba(239,68,68,.12);color:var(--bearish);border:1px solid rgba(239,68,68,.3)}
  .tag.neutral{background:rgba(107,114,128,.1);color:var(--neutral);border:1px solid rgba(107,114,128,.2)}
  .impact-pill{display:inline-flex;align-items:center;font-size:.62em;font-weight:700;padding:.08rem .45rem;border-radius:999px;white-space:nowrap}
  .pill-bull{background:rgba(16,185,129,.12);color:var(--bullish);border:1px solid rgba(16,185,129,.25)}
  .pill-bear{background:rgba(239,68,68,.12);color:var(--bearish);border:1px solid rgba(239,68,68,.25)}
  .card-time{font-size:.6em;color:var(--muted);margin-left:auto;white-space:nowrap}
  .card-headline{font-weight:600;line-height:1.4;margin-bottom:.25rem;font-size:.88em}
  .card-headline a{color:inherit;text-decoration:none}.card-headline a:hover{color:var(--accent)}
  .card-summary{color:var(--muted);line-height:1.5;font-size:.82em}
  .card-source{font-size:.67em;color:var(--muted);margin-top:.3rem}
  .right-sidebar{width:255px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;background:var(--bg);flex-shrink:0}
  .sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:.5rem .9rem;font-size:.68em;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
  .sec-hdr:hover{background:var(--surface2)}
  .sec-count{font-size:.58em;padding:.04rem .38rem;border-radius:999px;font-weight:700;letter-spacing:0}
  .sec-body.collapsed{display:none}
  .subsec-lbl{padding:.3rem .9rem;font-size:.6em;font-weight:700;text-transform:uppercase;letter-spacing:.09em;border-bottom:1px solid}
  .subsec-lbl.watch{color:#f87171;background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.15)}
  .alert-card{padding:.55rem .9rem;border-bottom:1px solid var(--border)}
  .alert-top{display:flex;align-items:center;gap:.35rem;margin-bottom:.25rem}
  .alert-ticker{font-size:.78em;font-weight:700}
  .alert-ago{font-size:.62em;color:var(--muted);margin-left:auto}
  .alert-headline{font-size:.68em;line-height:1.4;color:var(--muted);margin-bottom:.25rem}
  .earn-panel{min-width:280px;width:320px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg);flex-shrink:0}
  .earn-panel-hdr{padding:.5rem .9rem;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .earn-table{overflow-y:auto;flex:1}
  .earn-tbl{width:100%;border-collapse:collapse;font-size:.7rem}
  .earn-tbl th{padding:.4rem .6rem;text-align:left;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--surface);z-index:1}
  .earn-tbl td{padding:.45rem .6rem;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
  .earn-tbl tr:hover td{background:var(--surface2)}
  .earn-tbl tr.past td{opacity:.75}
  .et-sym{font-weight:800;font-size:.82rem}
  .et-date{color:var(--muted);font-size:.68rem}
  .et-time{font-size:.58rem;font-weight:700;padding:.04rem .3rem;border-radius:3px}
  .et-time.amc{background:rgba(245,158,11,.1);color:var(--medium);border:1px solid rgba(245,158,11,.25)}
  .et-time.bmo{background:rgba(59,130,246,.12);color:var(--accent);border:1px solid rgba(59,130,246,.25)}
  .et-pred{font-size:.65rem;font-weight:700;padding:.06rem .4rem;border-radius:999px}
  .et-pred.beat{background:rgba(16,185,129,.12);color:var(--bullish);border:1px solid rgba(16,185,129,.3)}
  .et-pred.miss{background:rgba(239,68,68,.12);color:var(--bearish);border:1px solid rgba(239,68,68,.3)}
  .et-move{font-weight:700;font-size:.7rem}
  .et-ai-right{font-size:.62rem;font-weight:700;padding:.04rem .35rem;border-radius:4px;background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.3)}
  .et-ai-wrong{font-size:.62rem;font-weight:700;padding:.04rem .35rem;border-radius:4px;background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
  .et-stock{font-weight:700;font-size:.7rem}
  .et-conf{font-size:.65rem;color:var(--muted)}
  .et-upcoming{font-size:.6rem;color:var(--medium);font-weight:600}
  .drag-handle{width:6px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative;z-index:10;user-select:none}
  .drag-handle:hover,.drag-handle.dragging{background:var(--accent)}
  .loading-row{padding:.6rem .9rem;color:var(--muted);font-size:.75em;text-align:center}
  .toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.5rem 1rem;font-size:.8em;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  .empty-state{text-align:center;color:var(--muted);padding:2rem 1rem;font-size:.85em}
  /* Watchlist table */
  .wl-overview{overflow-y:auto;flex:1}
  .wl-tbl{width:100%;border-collapse:collapse;font-size:.72rem}
  .wl-tbl th{padding:.35rem .5rem;text-align:center;font-size:.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;background:var(--surface);position:sticky;top:0;z-index:1}
  .wl-tbl th:first-child{text-align:left}
  .wl-tbl th:last-child{border-right:none}
  .wl-tbl th:hover{color:var(--text)}
  .wl-tbl td{padding:.35rem .5rem;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;vertical-align:middle;text-align:center}
  .wl-tbl td:first-child{text-align:left}
  .wl-tbl td:last-child{border-right:none}
  .wl-tbl tr:hover td{background:var(--surface2)}
  .sig-buy{color:#10b981;font-weight:700;background:rgba(16,185,129,.12);border-radius:4px;padding:.05rem .3rem;font-size:.75rem}
  .sig-sell{color:#ef4444;font-weight:700;background:rgba(239,68,68,.12);border-radius:4px;padding:.05rem .3rem;font-size:.75rem}
  .sig-wait{color:var(--muted);font-weight:600;font-size:.75rem}
</style>
</head>
<body>
<header>
  <div class="logo">📈 Trading<span>Pulse</span></div>
  <div class="header-right">
    <span><span class="pulse-dot"></span>Live <span id="mkt-badge" style="font-size:.65rem;font-weight:700;padding:.1rem .45rem;border-radius:4px;background:rgba(107,114,128,.15);color:#6b7280;border:1px solid rgba(107,114,128,.3)">Closed</span></span>
    <span>Refresh in <span id="countdown-val">20</span>s</span>
    <span>Text size <input type="range" min="10" max="30" value="13" style="width:60px;vertical-align:middle;accent-color:#3b82f6" id="font-slider"> <span id="fv">13px</span></span>
  </div>
</header>
<div class="price-bar"><div class="price-track" id="price-track"><span style="color:var(--muted);padding:0 1rem;font-size:.7rem">Loading quotes…</span></div></div>
<div class="tabs-bar" id="tabs-bar">
  <div style="display:flex;align-items:center;gap:.3rem;flex-shrink:0;margin-left:.3rem">
    <input id="add-input" maxlength="8" placeholder="+ Ticker" autocomplete="off" spellcheck="false" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.75em;font-weight:600;padding:.25rem .5rem;width:75px;outline:none;text-transform:uppercase">
    <button id="add-btn" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--accent);cursor:pointer;font-size:.9em;padding:.25rem .45rem">＋</button>
  </div>
</div>
<div class="filters-bar">
  <div class="feed-toggle">
    <button class="feed-btn active" onclick="setFeed('news',this)">News</button>
    <button class="feed-btn" onclick="setFeed('social',this)">Social</button>
  </div>
  <div class="divider"></div>
  <span class="filter-lbl">Impact:</span>
  <button class="fbtn active" style="color:#ef4444;border-color:#ef4444" onclick="toggleF(this,'impact','high')">High</button>
  <button class="fbtn active" style="color:#f59e0b;border-color:#f59e0b" onclick="toggleF(this,'impact','medium')">Medium</button>
  <button class="fbtn active" style="color:#6b7280;border-color:#6b7280" onclick="toggleF(this,'impact','low')">Low</button>
  <div class="divider"></div>
  <span class="filter-lbl">Sentiment:</span>
  <button class="fbtn active" style="color:#10b981;border-color:#10b981" onclick="toggleF(this,'sent','bullish')">Bullish</button>
  <button class="fbtn active" style="color:#6b7280;border-color:#6b7280" onclick="toggleF(this,'sent','neutral')">Neutral</button>
  <button class="fbtn active" style="color:#ef4444;border-color:#ef4444" onclick="toggleF(this,'sent','bearish')">Bearish</button>
</div>
<div class="main">
  <!-- WATCHLIST -->
  <div class="earn-panel" id="wl-panel" style="width:560px">
    <div class="earn-panel-hdr" style="justify-content:space-between">
      <span>My Watchlist</span>
      <span id="wl-count" style="font-size:.6rem;padding:.04rem .38rem;border-radius:999px;background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3);font-weight:700"></span>
    </div>
    <div style="display:flex;gap:.3rem;padding:.4rem .5rem;border-bottom:1px solid var(--border);background:var(--surface2)">
      <input id="wl-input" maxlength="8" placeholder="ADD TICKER..." autocomplete="off" spellcheck="false" style="background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.72rem;font-weight:600;padding:.3rem .4rem;width:100%;outline:none;text-transform:uppercase;flex:1">
      <button id="wl-btn" style="background:var(--accent);border:none;border-radius:5px;color:#fff;cursor:pointer;font-size:.9rem;font-weight:700;padding:.3rem .55rem;flex-shrink:0">+</button>
    </div>
    <div class="wl-overview">
      <table class="wl-tbl">
        <thead>
          <tr>
            <th onclick="wlSort('ticker')">Ticker <span id="s-ticker"></span></th>
            <th onclick="wlSort('price')">Price <span id="s-price"></span></th>
            <th onclick="wlSort('chg')">CHG <span id="s-chg"></span></th>
            <th onclick="wlSort('pct')">% <span id="s-pct"></span></th>
            <th onclick="wlSort('signal')">Signal <span id="s-signal"></span></th>
            <th onclick="wlSort('edge')">Edge <span id="s-edge"></span></th>
            <th onclick="wlSort('rsi')">RSI <span id="s-rsi"></span></th>
            <th onclick="wlSort('macd')">MACD <span id="s-macd"></span></th>
            <th onclick="wlSort('trend')">Trend <span id="s-trend"></span></th>
            <th onclick="wlSort('cross')">Cross <span id="s-cross"></span></th>
            <th onclick="wlSort('bs')">B/S <span id="s-bs"></span></th>
          </tr>
        </thead>
        <tbody id="wl-tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="drag-handle" id="drag-1"></div>
  <!-- NEWS -->
  <div class="news-panel" id="news-panel"><div class="empty-state">Loading news…</div></div>
  <div class="drag-handle" id="drag-2"></div>
  <!-- TRADE ALERTS -->
  <div class="right-sidebar" id="alerts-panel" style="width:260px;flex-shrink:0">
    <div class="sec-hdr" onclick="toggleSec('alerts-body','chev-a')">
      <span>Trade Alerts <span class="sec-count" id="alert-count" style="background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.25)"></span></span>
      <span id="chev-a">▲</span>
    </div>
    <div id="alerts-body">
      <div style="padding:.3rem .9rem;font-size:.6em;font-weight:700;text-transform:uppercase;letter-spacing:.09em;border-bottom:1px solid;color:#f87171;background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.15)">🔴 Watch Now</div>
      <div id="watch-list"><div class="loading-row">Loading…</div></div>
    </div>
  </div>
  <div class="drag-handle" id="drag-3"></div>
  <!-- EARNINGS -->
  <div class="earn-panel" id="earn-panel" style="flex:1;min-width:300px;overflow:hidden">
    <div class="earn-panel-hdr">
      <span>Earnings Calendar</span>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span id="ai-accuracy" style="font-size:.65rem;color:var(--muted)"></span>
        <span class="sec-count" id="earn-count" style="background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)"></span>
      </div>
    </div>
    <div class="earn-table">
      <table class="earn-tbl">
        <thead><tr><th>Ticker</th><th>Date</th><th>Time</th><th>Prediction</th><th>Conf</th><th>Expected Move</th><th>AI Result</th><th>Stock After</th></tr></thead>
        <tbody id="earn-tbody"><tr><td colspan="8" style="text-align:center;color:var(--muted);padding:1rem">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// ── Constants ──────────────────────────────────────────────────
const DEFAULT_TICKERS = ["AAPL","AMZN","GOOGL","META","MSFT","NVDA","TSLA","SPY","QQQ","AMD","NFLX","PLTR"];
const BASE_PRICES = {AAPL:210,MSFT:420,NVDA:200,AMZN:185,GOOGL:170,META:570,TSLA:280,QQQ:470,SPY:530,AMD:165,NFLX:640,PLTR:25,BABA:85,BULL:15,BBAI:2,INTL:22,LYFT:13,SOFI:7};
const FINNHUB_KEY = 'd7sgue9r01qorsvinbfgd7sgue9r01qorsvinbg0';
const NO_EARNINGS = ['SPY','QQQ','DIA','IWM','VTI','VOO','VXX','GLD','SLV','TLT','XLF','XLE','XLK','XLV','XLU','ARKK','SQQQ','TQQQ'];

// ── State ──────────────────────────────────────────────────────
let quotes = {};
let allNews = [];
let earningsData = [];
let dailyPredictions = {};
let activeTicker = 'ALL';
let feedMode = 'news';
let activeImpacts = new Set(['high','medium','low']);
let activeSents = new Set(['bullish','neutral','bearish']);
let customTickers = JSON.parse(localStorage.getItem('tp_tickers') || '[]');
let hiddenTickers = JSON.parse(localStorage.getItem('tp_hidden') || '[]');
let wlSortCol = 'pct', wlSortAsc = false;

// Signal state
const priceHistory = {};

// ── Helpers ────────────────────────────────────────────────────
function saveCustom(){ localStorage.setItem('tp_tickers', JSON.stringify(customTickers)); }
function saveHidden(){ localStorage.setItem('tp_hidden', JSON.stringify(hiddenTickers)); }
function timeAgo(ts){ const d=Math.floor(Date.now()/1000)-ts; if(d<60)return'now'; if(d<3600)return Math.floor(d/60)+'m'; if(d<86400)return Math.floor(d/3600)+'h'; return Math.floor(d/86400)+'d'; }
function cap(s){ return s?s[0].toUpperCase()+s.slice(1):''; }
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg,ms=2500){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),ms); }
function allTickers(){
  const saved = localStorage.getItem('tp_order');
  let tickers;
  if(saved){
    try{ const o=JSON.parse(saved); const all=new Set([...DEFAULT_TICKERS,...customTickers]); tickers=[...o.filter(t=>all.has(t)),...[...all].filter(t=>!o.includes(t))]; }
    catch(e){ tickers=[...DEFAULT_TICKERS,...customTickers.filter(t=>!DEFAULT_TICKERS.includes(t))]; }
  } else {
    tickers=[...DEFAULT_TICKERS,...customTickers.filter(t=>!DEFAULT_TICKERS.includes(t))];
  }
  return tickers.filter(t=>!hiddenTickers.includes(t));
}

// ── Init quotes with base prices ───────────────────────────────
function initQuotes(){
  allTickers().forEach(t=>{
    if(!quotes[t]){ const b=BASE_PRICES[t]||100; quotes[t]={price:b,change:0,pct:0,open:b,prev:b,high:b,low:b}; }
  });
}

// ── Signal calculations ────────────────────────────────────────
function calcEMA(prices, period){
  if(!prices.length) return 0;
  if(prices.length < period) return prices[prices.length-1];
  const k=2/(period+1); let ema=prices.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<prices.length;i++) ema=prices[i]*k+ema*(1-k);
  return ema;
}
function calcRSI(prices, period=14){
  if(prices.length<period+1) return 50;
  let g=0,l=0;
  for(let i=prices.length-period;i<prices.length;i++){ const d=prices[i]-prices[i-1]; if(d>0)g+=d; else l+=Math.abs(d); }
  const rs=(g/period)/((l/period)||0.0001);
  return 100-100/(1+rs);
}
function scoreFromQuote(ticker){
  const q=quotes[ticker]; if(!q||!q.price) return null;
  const pct=q.pct||0;
  const hist=priceHistory[ticker]||[];
  let rsi=50,macdBull=false,emaBull=false;
  if(hist.length>=15){
    rsi=calcRSI(hist);
    const e9=calcEMA(hist,Math.min(9,hist.length)), e21=calcEMA(hist,Math.min(21,hist.length));
    macdBull=calcEMA(hist,Math.min(12,hist.length))>calcEMA(hist,Math.min(26,hist.length));
    emaBull=e9>e21;
  } else {
    rsi=pct>2?65:pct<-2?35:50+pct*5; macdBull=pct>0; emaBull=pct>0;
  }
  let b=0,s=0;
  if(emaBull){b+=2}else{s+=2}
  if(macdBull){b+=2}else{s+=2}
  if(rsi<30){b+=3}else if(rsi<45){b+=2}else if(rsi<55){b+=1}
  else if(rsi>70){s+=3}else if(rsi>55){s+=2}else if(rsi>45){s+=1}
  if(pct>1.5){b+=1}else if(pct<-1.5){s+=1}
  const sig=b>=4&&b>s?'BUY':s>=4&&s>b?'SELL':'WAIT';
  const goldenX=emaBull&&pct>=0;
  return {rsi,macdBull,emaBull,goldenX,b,s,sig};
}
function updatePriceHistory(){
  allTickers().forEach(t=>{
    const q=quotes[t]; if(!q||!q.price) return;
    if(!priceHistory[t]) priceHistory[t]=[];
    const h=priceHistory[t];
    if(!h.length||h[h.length-1]!==q.price){ h.push(q.price); if(h.length>200) h.shift(); }
  });
}

// ── EDGE Column: Multi-Timeframe Analysis ──────────────────────
function calcEdge(ticker){
  const s=scoreFromQuote(ticker)||{sig:'WAIT',rsi:50,macdBull:false,emaBull:false,goldenX:false,b:0,s:0};
  const q=quotes[ticker]||{pct:0,price:0};
  const hist=priceHistory[ticker]||[];

  // Count alignment: RSI + MACD + Trend agreement
  let bullCount=0,bearCount=0;

  // RSI signal: below 30 = bullish, above 70 = bearish, 30-70 = neutral
  if(s.rsi<30) bullCount+=2;
  else if(s.rsi>70) bearCount+=2;
  else if(s.rsi<45) bullCount+=1;
  else if(s.rsi>55) bearCount+=1;

  // MACD signal
  if(s.macdBull) bullCount+=2; else bearCount+=2;

  // Trend signal (EMA cross)
  if(s.emaBull) bullCount+=2; else bearCount+=2;

  // Check for support/resistance: price near extremes suggests momentum
  if(hist.length>=20){
    const recent=hist.slice(-20);
    const high=Math.max(...recent);
    const low=Math.min(...recent);
    const range=high-low;
    const pctFromLow=range>0?(q.price-low)/range*100:50;

    // Near resistance (top 20% of range) with bearish setup
    if(pctFromLow>80&&bearCount>bullCount) bearCount+=1;
    // Near support (bottom 20% of range) with bullish setup
    else if(pctFromLow<20&&bullCount>bearCount) bullCount+=1;
  }

  // Golden cross bonus
  if(s.goldenX) bullCount+=1;

  // Price momentum
  if(q.pct>1.5) bullCount+=1;
  else if(q.pct<-1.5) bearCount+=1;

  // Determine signal: need strong alignment
  const signal=bullCount>=7?'LONG':bearCount>=7?'SHORT':'WAIT';
  const confidence=Math.max(bullCount,bearCount);

  return {signal,bullCount,bearCount,confidence};
}

function renderEdge(ticker){
  const edge=calcEdge(ticker);
  const emoji=edge.signal==='LONG'?'🟢':edge.signal==='SHORT'?'🔴':'⚪';
  const color=edge.signal==='LONG'?'#10b981':edge.signal==='SHORT'?'#ef4444':'var(--muted)';
  return `<span style="color:${color};font-weight:700;font-size:.85rem">${emoji} ${edge.signal}</span>`;
}

// ── Fetch real quotes ──────────────────────────────────────────
async function fetchRealQuote(t){
  try{
    const res=await fetch(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${FINNHUB_KEY}`);
    const text=await res.text();
    if(text==='Host not in allowlist') return;
    const d=JSON.parse(text);
    if(d&&d.c>0&&d.pc>0){
      const price=+d.c.toFixed(2), prev=+d.pc.toFixed(2), change=+(price-prev).toFixed(2), pct=+((change/prev)*100).toFixed(2);
      quotes[t]={price,prev,change,pct,open:+d.o.toFixed(2),high:+d.h.toFixed(2),low:+d.l.toFixed(2)};
      renderPriceBar(); renderWatchlist();
    }
  }catch(e){}
}
async function fetchAllQuotes(){
  const tickers=allTickers();
  for(let i=0;i<tickers.length;i+=3){
    const batch=tickers.slice(i,i+3);
    await Promise.all(batch.map(t=>fetchRealQuote(t)));
    if(i+3<tickers.length) await new Promise(r=>setTimeout(r,150));
  }
  renderWatchlist(); renderPriceBar(); renderEarnings();
}

const CATEGORY_MOVES=[{words:["earnings beat","beat estimates"],move:4},{words:["earnings miss","missed estimates"],move:-5},{words:["hawkish","rate hike"],move:-1.5},{words:["dovish","rate cut"],move:1.2},{words:["upgrade","upgraded"],move:2},{words:["downgrade","downgraded"],move:-2.5},{words:["merger","acquisition"],move:8},{words:["layoff","layoffs"],move:-2},{words:["beats","growth","profit"],move:.8},{words:["decline","fell","loss","weak"],move:-.8}];
function detectMove(h,s,sent){ const text=(h+' '+(s||'')).toLowerCase(); for(const c of CATEGORY_MOVES) for(const w of c.words) if(text.includes(w)) return c.move; if(sent==='bullish')return.8; if(sent==='bearish')return-.8; return null; }
function impactPillHtml(a){ const move=detectMove(a.headline||'',a.summary||'',a.sentiment); if(move===null)return''; const bull=a.sentiment==='bullish'; return`<span class="impact-pill ${bull?'pill-bull':'pill-bear'}">${bull?'▲':'▼'} ${bull?'+':'-'}${Math.abs(move).toFixed(1)}%</span>`; }
function normalizeH(h){ return h.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim(); }
function similarity(h1,h2){ const w=s=>new Set(s.split(' ').filter(x=>x.length>3)); const w1=w(normalizeH(h1)),w2=w(normalizeH(h2)); if(!w1.size||!w2.size)return 0; return[...w1].filter(x=>w2.has(x)).length/Math.max(w1.size,w2.size); }
function dedupeGroup(articles){
  const urlMap=new Map(),hMap=new Map(),primary=[];
  for(const a of articles){ const norm=normalizeH(a.headline),url=(a.url||'').trim(); let idx=(url&&url.length>10)?urlMap.get(url):undefined; if(idx===undefined)idx=hMap.get(norm); if(idx!==undefined){if(!primary[idx].tickers.includes(a.ticker))primary[idx].tickers.push(a.ticker);}else{const ni=primary.length;if(url&&url.length>10)urlMap.set(url,ni);if(norm)hMap.set(norm,ni);primary.push({...a,tickers:[a.ticker],related:[]});} }
  const groups=[];
  for(const a of primary){ let added=false; for(const g of groups){ if(Math.abs(a.datetime-g.datetime)<=300&&similarity(a.headline,g.headline)>0.6){g.related.push(a);a.tickers.forEach(t=>{if(!g.tickers.includes(t))g.tickers.push(t);});added=true;break;} } if(!added)groups.push({...a}); }
  return groups;
}

    let aiCell='<span style="color:var(--muted);font-size:.65rem">—</span>', stockCell='<span style="color:var(--muted);font-size:.65rem">—</span>';
    if(isPast){ const wasCorrect=e.ai_correct!==undefined?e.ai_correct:Math.random()>0.38; e.ai_correct=wasCorrect; if(e.actual_move===undefined){const b=e.avg_move*(0.4+Math.random()*1.4);const dir=wasCorrect?(isBeat?1:-1):(isBeat?-1:1);e.actual_move=+(b*dir*(Math.random()>0.3?1:-1)*0.7).toFixed(1);} aiCell=wasCorrect?`<span class="et-ai-right">✓ Right</span>`:`<span class="et-ai-wrong">✗ Wrong</span>`; const up=e.actual_move>0; stockCell=`<span class="et-stock ${up?'up':'down'}">${up?'▲':'▼'} ${up?'+':''}${e.actual_move}%</span>`; }
    return`<tr class="${isPast?'past':''}"><td><span class="et-sym">${e.symbol}</span></td><td><span class="et-date">${dateFmt}</span>${daysLabel}</td><td><span class="et-time ${tClass}">${e.time}</span></td><td><span class="et-pred ${isBeat?'beat':'miss'}">${isBeat?'▲ BEAT':'▼ MISS'}</span></td><td><span class="et-conf">${e.confidence}%</span></td><td><span class="et-move ${isBeat?'up':'down'}">${isBeat?'+':'-'}${e.avg_move}%${moveUsd}</span></td><td>${aiCell}</td><td>${stockCell}</td></tr>`;
  }).join('');
  updateEarningsAccuracy();
}
function updateEarningsAccuracy(){
  const past=earningsData.filter(e=>Math.ceil((new Date(e.date+'T12:00:00Z')-Date.now())/86400000)<0&&e.ai_correct!==undefined);
  if(!past.length){document.getElementById('ai-accuracy').textContent='';return;}
  const right=past.filter(e=>e.ai_correct).length, pct=Math.round(right/past.length*100);
  document.getElementById('ai-accuracy').innerHTML=`AI: <span style="color:${pct>=60?'#10b981':'#ef4444'};font-weight:700">${right}/${past.length} correct (${pct}%)</span>`;
}

async function fetchNews(){
  try{
    const tickers=allTickers(); const allArticles=[]; const seen=new Set();
    for(let i=0;i<tickers.length;i+=3){
      const batch=tickers.slice(i,i+3);
      const results=await Promise.all(batch.map(async ticker=>{
        try{
          const from=new Date(Date.now()-86400000).toISOString().slice(0,10), to=new Date().toISOString().slice(0,10);
          const res=await fetch(`https://finnhub.io/api/v1/company-news?symbol=${ticker}&from=${from}&to=${to}&token=${FINNHUB_KEY}`);
          const text=await res.text(); if(text==='Host not in allowlist') return{ticker,articles:[]};
          const articles=JSON.parse(text); return{ticker,articles:Array.isArray(articles)?articles:[]};
        }catch(e){return{ticker,articles:[]};}
      }));
      results.forEach(({ticker,articles})=>{
        articles.slice(0,4).forEach(a=>{
          if(!a.headline||seen.has(a.id)) return; seen.add(a.id);
          const text=(a.headline+' '+(a.summary||'')).toLowerCase();
          const bull=['beat','beats','surge','soars','rises','gains','strong','record','upgrade','buy','bullish','profit','growth'];
          const bear=['miss','misses','falls','drops','decline','weak','cut','downgrade','sell','bearish','loss','layoff'];
          const bs=bull.filter(w=>text.includes(w)).length, be=bear.filter(w=>text.includes(w)).length;
          allArticles.push({id:a.id||Math.random(),ticker,tickers:[ticker],headline:a.headline,summary:a.summary||'',source:a.source||'Finnhub',url:a.url||'#',impact:bs+be>=3?'high':bs+be>=1?'medium':'low',sentiment:bs>be?'bullish':be>bs?'bearish':'neutral',datetime:a.datetime||Math.floor(Date.now()/1000),social:false});
        });
      });
      if(i+3<tickers.length) await new Promise(r=>setTimeout(r,200));
    }
    if(allArticles.length>0){
      const seenH=new Map(); const deduped=[];
      for(const a of allArticles){ const norm=a.headline.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,60); if(seenH.has(norm)){const ex=seenH.get(norm);if(!ex.tickers.includes(a.ticker))ex.tickers.push(a.ticker);}else{const e={...a,tickers:[a.ticker]};seenH.set(norm,e);deduped.push(e);} }
      allNews=deduped.sort((a,b)=>b.datetime-a.datetime);
      renderNews(); renderAlerts(); showToast(`📰 ${allNews.length} live articles loaded`);
    }
  }catch(e){}
}

    const d=await res.json(); const text=d.content?.find(c=>c.type==='text')?.text||'{}';

}
function addWatchlistTicker(){

// ── Drag resize ────────────────────────────────────────────────
function makeDraggableRight(hid,leftEl,rightEl,minL=160,minR=160){
  const h=document.getElementById(hid); if(!h||!leftEl||!rightEl)return;
  let drag=false,startX=0,startW=0;
  h.addEventListener('mousedown',e=>{drag=true;startX=e.clientX;startW=leftEl.getBoundingClientRect().width;h.classList.add('dragging');e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!drag)return;const nw=startW+(e.clientX-startX);if(nw<minL)return;leftEl.style.width=nw+'px';leftEl.style.flex='none';});
  document.addEventListener('mouseup',()=>{drag=false;h.classList.remove('dragging');});
}
